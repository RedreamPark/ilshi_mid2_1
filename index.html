<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>단원평가 모음 — L1 & L2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Fredoka+One&display=swap');
:root{
  --bg:#0f172a;--card:#1e293b;--card2:#253347;
  --primary:#fb923c;--primary-d:#ea580c;
  --green:#34d399;--red:#f87171;--yellow:#fbbf24;--blue:#38bdf8;
  --text:#f1f5f9;--muted:#94a3b8;--border:#334155;--r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.hdr{background:linear-gradient(135deg,#ea580c,#9333ea);padding:14px 16px 12px;position:sticky;top:0;z-index:50;}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.hdr h1{font-family:'Fredoka One',sans-serif;font-size:1.2rem;flex:1;}
.score-chip{background:rgba(255,255,255,.2);border-radius:99px;padding:4px 12px;font-size:.82rem;font-weight:700;}
.prog-bar{height:6px;background:rgba(255,255,255,.2);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:#fff;border-radius:99px;transition:width .4s;}
.nav{display:flex;gap:6px;padding:12px 14px;overflow-x:auto;scrollbar-width:none;background:var(--card);}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{flex-shrink:0;padding:7px 14px;border-radius:99px;border:none;font-family:inherit;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .2s;background:var(--card2);color:var(--muted);}
.nav-btn.on{background:var(--primary);color:#fff;}
.sec{display:none;padding:14px;animation:fadeUp .3s;}
.sec.on{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.sec-title{font-family:'Fredoka One',sans-serif;font-size:1.05rem;color:var(--primary);margin-bottom:12px;}
.badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:.72rem;font-weight:900;}
.b1{background:#0c4a6e;color:#38bdf8;}.b2{background:#4c1d95;color:#a78bfa;}
.stat-row{display:flex;justify-content:space-around;background:var(--card);border-radius:var(--r);padding:12px;margin-bottom:12px;}
.stat .n{font-size:1.3rem;font-weight:900;text-align:center;}
.stat .l{font-size:.72rem;color:var(--muted);text-align:center;}
.q-card{background:var(--card);border-radius:var(--r);padding:18px;margin-bottom:10px;border:1px solid var(--border);}
.q-meta{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.q-num{font-size:.75rem;font-weight:900;color:var(--muted);}
.q-type{font-size:.7rem;background:var(--card2);color:var(--muted);padding:2px 8px;border-radius:6px;}
.q-text{font-size:.9rem;font-weight:700;line-height:1.7;margin-bottom:8px;color:var(--text);}
.q-passage{background:var(--card2);border-radius:8px;padding:12px;margin-bottom:10px;font-size:.82rem;line-height:1.8;color:#cbd5e1;border-left:3px solid var(--blue);}
.opts{display:flex;flex-direction:column;gap:8px;}
.opt{padding:11px 14px;border-radius:10px;border:2px solid var(--border);font-family:inherit;font-size:.84rem;font-weight:700;cursor:pointer;background:var(--card2);color:var(--text);text-align:left;transition:all .2s;word-break:keep-all;line-height:1.5;}
.opt:active{transform:scale(.98);}
.opt.ok{border-color:var(--green);background:#064e3b;color:var(--green);}
.opt.err{border-color:var(--red);background:#450a0a;color:var(--red);}
.opt.reveal{border-color:var(--green);background:#064e3b;color:var(--green);}
.opt:disabled{cursor:default;}
.q-fb{margin-top:10px;padding:10px 12px;border-radius:8px;font-size:.82rem;font-weight:700;display:none;}
.q-fb.show{display:block;}
.q-fb.ok{background:#064e3b;color:var(--green);}
.q-fb.err{background:#450a0a;color:var(--red);}
.exp-box{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-top:8px;font-size:.8rem;color:var(--muted);line-height:1.7;display:none;}
.exp-box.show{display:block;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:99px;border:none;font-family:inherit;font-weight:900;font-size:.88rem;cursor:pointer;transition:all .2s;}
.btn-p{background:var(--primary);color:#fff;}
.btn-s{background:var(--card2);color:var(--text);border:2px solid var(--border);}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
.result-banner{background:linear-gradient(135deg,var(--green),#059669);border-radius:var(--r);padding:20px;text-align:center;margin-bottom:12px;}
.result-banner h2{font-family:'Fredoka One',sans-serif;font-size:1.4rem;margin-bottom:4px;}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top">
    <h1>🧩 단원평가</h1>
    <div class="score-chip">⭐ <span id="scoreNum">0</span>점</div>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
</div>

<div class="nav">
  <button class="nav-btn on" onclick="goSec('q1')">🔵 L1 단원평가</button>
  <button class="nav-btn" onclick="goSec('q2')">🟣 L2 단원평가</button>
  <button class="nav-btn" onclick="goSec('qMix')">🔀 랜덤 혼합</button>
</div>

<div class="sec on" id="sec-q1">
  <div class="sec-title">🔵 Lesson 1 단원평가</div>
  <div class="stat-row">
    <div class="stat"><div class="n" id="s1c">0</div><div class="l">정답</div></div>
    <div class="stat"><div class="n" id="s1w">0</div><div class="l">오답</div></div>
    <div class="stat"><div class="n" id="s1l">-</div><div class="l">남음</div></div>
  </div>
  <div id="q1Area"></div>
</div>

<div class="sec" id="sec-q2">
  <div class="sec-title">🟣 Lesson 2 단원평가</div>
  <div class="stat-row">
    <div class="stat"><div class="n" id="s2c">0</div><div class="l">정답</div></div>
    <div class="stat"><div class="n" id="s2w">0</div><div class="l">오답</div></div>
    <div class="stat"><div class="n" id="s2l">-</div><div class="l">남음</div></div>
  </div>
  <div id="q2Area"></div>
</div>

<div class="sec" id="sec-qMix">
  <div class="sec-title">🔀 랜덤 혼합 모드</div>
  <div class="stat-row">
    <div class="stat"><div class="n" id="sMc">0</div><div class="l">정답</div></div>
    <div class="stat"><div class="n" id="sMw">0</div><div class="l">오답</div></div>
    <div class="stat"><div class="n" id="sMl">-</div><div class="l">남음</div></div>
  </div>
  <div id="qMixArea"></div>
</div>

<script>
let totalScore=0;
function addScore(n){ totalScore+=n; document.getElementById('scoreNum').textContent=totalScore; }
function setProgress(d,t){ document.getElementById('progFill').style.width=(t?Math.round(d/t*100):0)+'%'; }

function goSec(id){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('sec-'+id).classList.add('on');
  event.currentTarget.classList.add('on');
  if(id==='q1') initQ('1');
  if(id==='q2') initQ('2');
  if(id==='qMix') initQ('Mix');
}

// ─── LESSON 1 QUIZ DATA ───
const Q1 = [
  {
    badge:'b1', type:'어휘',

      "teenagers"
    ], ans:1,
    exp:"them = your teachers or parents (일부는 그런 표현의 의미를 모를 수도 있는 대상)"
  },
  {
    badge:'b2', type:'독해',
    q:"다음 글의 주제로 알맞은 것은?\n[지문] When we talk with someone, we use not only words but also facial expressions and body language. Sometimes, a little emoji can speak louder than many words. The problem is that not everybody uses emojis in the same way. Some people like to use them a lot, and some don't. In addition, the same emojis can mean different things to different people.",
    opts:[
      "Texting is better than talking.",
      "People use emojis differently.",
      "Emojis are necessary in texting.",
      "Misunderstandings can happen all the time.",
      "The meanings of emojis are easy to understand."
    ], ans:1,
    exp:"이모지를 사람마다 다르게 사용한다는 내용: People use emojis differently."
  },
];

// ─── ENGINE ───
let qState = {
  '1': {idx:0, data:[], correct:0, wrong:0},
  '2': {idx:0, data:[], correct:0, wrong:0},
  'Mix': {idx:0, data:[], correct:0, wrong:0},
};

function initQ(l){
  let data;
  if(l==='1') data=[...Q1];
  else if(l==='2') data=[...Q2];
  else data=[...Q1,...Q2];
  qState[l]={idx:0, data:data.sort(()=>Math.random()-.5), correct:0, wrong:0};
  renderQ(l);
}

function renderQ(l){
  const s=qState[l];
  const area=document.getElementById('q'+l+'Area');
  const prefix = l==='Mix'?'M':l;
  document.getElementById('s'+prefix+'c').textContent=s.correct;
  document.getElementById('s'+prefix+'w').textContent=s.wrong;

  if(s.idx>=s.data.length){
    const total=s.data.length;
    area.innerHTML=`
      <div class="result-banner">
        <h2>${s.correct>=total*.7?'🎉':'💪'} ${s.correct}/${total}</h2>
        <p>${s.correct>=total*.7?'잘 했어요!':'다시 도전해 봐요!'} (${Math.round(s.correct/total*100)}%)</p>
      </div>
      <div class="btn-row"><button class="btn btn-p" onclick="initQ('${l}')">🔄 다시 풀기</button></div>`;
    return;
  }

  document.getElementById('s'+prefix+'l').textContent=s.data.length-s.idx;
  setProgress(s.idx, s.data.length);

  const q=s.data[s.idx];
  const nums=['①','②','③','④','⑤'];
  const opts2=q.opts.map((o,i)=>`
    <button class="opt" onclick="checkQ('${l}',${i},this)"><span style="color:var(--muted);margin-right:6px;">${nums[i]}</span> ${o}</button>
  `).join('');

  area.innerHTML=`
    <div class="q-card">
      <div class="q-meta">
        <span class="q-num">${s.idx+1}/${s.data.length}</span>
        <span class="badge ${q.badge||'b1'}">${q.badge==='b2'?'L2':'L1'}</span>
        <span class="q-type">${q.type}</span>
      </div>
      <div class="q-text">${q.q.replace(/\[지문\]/g,'').replace(/\n/g,'<br>').replace(/\[([^\]]+)\]/g,'<div class="q-passage">$1</div>')}</div>
      <div class="opts">${opts2}</div>
      <div class="q-fb" id="qFb${l}"></div>
      <div class="exp-box" id="qExp${l}">${q.exp}</div>
    </div>`;
}

function checkQ(l, selected, el){
  const s=qState[l];
  const q=s.data[s.idx];
  const prefix=l==='Mix'?'M':l;
  document.querySelectorAll('#q'+l+'Area .opt').forEach(b=>b.disabled=true);
  const fb=document.getElementById('qFb'+l);
  const exp=document.getElementById('qExp'+l);
  if(selected===q.ans){
    el.classList.add('ok');
    fb.textContent='✅ 정답!'; fb.className='q-fb show ok';
    s.correct++; addScore(10);
  } else {
    el.classList.add('err');
    document.querySelectorAll('#q'+l+'Area .opt')[q.ans]?.classList.add('reveal');
    fb.textContent='❌ 틀렸어요!'; fb.className='q-fb show err';
    s.wrong++;
  }
  exp.classList.add('show');
  document.getElementById('s'+prefix+'c').textContent=s.correct;
  document.getElementById('s'+prefix+'w').textContent=s.wrong;
  setTimeout(()=>{ s.idx++; renderQ(l); },1800);
}

initQ('1');
</script>
