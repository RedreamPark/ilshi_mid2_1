<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>단어 학습 — L1 & L2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Fredoka+One&display=swap');
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --card2: #253347;
  --primary: #38bdf8;
  --primary-d: #0284c7;
  --green: #34d399;
  --red: #f87171;
  --yellow: #fbbf24;
  --text: #f1f5f9;
  --muted: #94a3b8;
  --border: #334155;
  --r: 14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* HEADER */
.hdr{background:linear-gradient(135deg,#0ea5e9,#6366f1);padding:14px 16px 12px;position:sticky;top:0;z-index:50;}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.hdr h1{font-family:'Fredoka One',sans-serif;font-size:1.2rem;flex:1;letter-spacing:.5px;}
.score-chip{background:rgba(255,255,255,.2);backdrop-filter:blur(8px);border-radius:99px;padding:4px 12px;font-size:.82rem;font-weight:700;}
.prog-bar{height:6px;background:rgba(255,255,255,.2);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:#fff;border-radius:99px;transition:width .4s;}

/* NAV TABS */
.nav{display:flex;gap:6px;padding:12px 14px;overflow-x:auto;scrollbar-width:none;background:var(--card);}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{flex-shrink:0;padding:7px 14px;border-radius:99px;border:none;font-family:inherit;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .2s;background:var(--card2);color:var(--muted);}
.nav-btn.on{background:var(--primary);color:#0f172a;}

/* SECTIONS */
.sec{display:none;padding:14px;}
.sec.on{display:block;animation:fadeUp .3s;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* SECTION TITLE */
.sec-title{font-family:'Fredoka One',sans-serif;font-size:1.05rem;color:var(--primary);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:.72rem;font-weight:900;}
.b1{background:#0c4a6e;color:#38bdf8;}
.b2{background:#4c1d95;color:#a78bfa;}

/* WORD CARD (browse) */
.wcard{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:10px;border:1px solid var(--border);transition:transform .15s;}
.wcard:active{transform:scale(.98);}
.wcard-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.wcard-en{font-size:1.1rem;font-weight:900;color:var(--primary);}
.wcard-ko{font-size:.85rem;color:var(--muted);}
.wcard-def{font-size:.8rem;color:var(--muted);line-height:1.6;margin-bottom:6px;}
.wcard-ex{font-size:.82rem;background:var(--card2);border-radius:8px;padding:8px 10px;line-height:1.6;color:#cbd5e1;}

/* MATCH GAME */
.match-info{font-size:.82rem;color:var(--muted);margin-bottom:10px;}
.match-cols{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.match-col-title{font-size:.75rem;font-weight:700;color:var(--muted);text-align:center;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.match-item{
  padding:10px 10px;border-radius:10px;border:2px solid var(--border);
  cursor:pointer;font-size:.82rem;font-weight:700;transition:all .2s;
  background:var(--card2);text-align:center;min-height:52px;
  display:flex;align-items:center;justify-content:center;word-break:keep-all;line-height:1.4;
}
.match-item.sel{border-color:var(--primary);background:#0c4a6e;color:var(--primary);}
.match-item.ok{border-color:var(--green);background:#064e3b;color:var(--green);pointer-events:none;}
.match-item.err{border-color:var(--red);background:#450a0a;animation:shk .3s;}
@keyframes shk{25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.match-item.ghost{opacity:0;pointer-events:none;}

/* RESULT BANNER */
.result-banner{background:linear-gradient(135deg,var(--green),#059669);border-radius:var(--r);padding:20px;text-align:center;margin-bottom:12px;}
.result-banner h2{font-family:'Fredoka One',sans-serif;font-size:1.5rem;margin-bottom:4px;}
.result-banner p{font-size:.88rem;opacity:.9;}

/* QUIZ */
.q-card{background:var(--card);border-radius:var(--r);padding:18px;margin-bottom:10px;border:1px solid var(--border);}
.q-num{font-size:.75rem;font-weight:900;color:var(--muted);margin-bottom:6px;}
.q-word{font-size:1.2rem;font-weight:900;color:var(--primary);margin-bottom:4px;}
.q-hint{font-size:.78rem;color:var(--muted);margin-bottom:14px;font-style:italic;line-height:1.5;}
.opts{display:flex;flex-direction:column;gap:8px;}
.opt{
  padding:11px 14px;border-radius:10px;border:2px solid var(--border);
  font-family:inherit;font-size:.85rem;font-weight:700;cursor:pointer;
  background:var(--card2);color:var(--text);text-align:left;transition:all .2s;word-break:keep-all;
}
.opt:active{transform:scale(.98);}
.opt.ok{border-color:var(--green);background:#064e3b;color:var(--green);}
.opt.err{border-color:var(--red);background:#450a0a;color:var(--red);}
.opt.reveal{border-color:var(--green);background:#064e3b;color:var(--green);}
.opt:disabled{cursor:default;}
.q-feedback{margin-top:10px;padding:10px 12px;border-radius:8px;font-size:.82rem;font-weight:700;display:none;}
.q-feedback.show{display:block;}
.q-feedback.ok{background:#064e3b;color:var(--green);}
.q-feedback.err{background:#450a0a;color:var(--red);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:99px;border:none;font-family:inherit;font-weight:900;font-size:.88rem;cursor:pointer;transition:all .2s;}
.btn-p{background:var(--primary);color:#0f172a;}
.btn-p:active{background:var(--primary-d);}
.btn-g{background:var(--green);color:#0f172a;}
.btn-s{background:var(--card2);color:var(--text);border:2px solid var(--border);}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}

/* STAT BAR */
.stat-row{display:flex;justify-content:space-around;background:var(--card);border-radius:var(--r);padding:12px;margin-bottom:12px;}
.stat{text-align:center;}
.stat .n{font-size:1.3rem;font-weight:900;}
.stat .l{font-size:.72rem;color:var(--muted);}

/* SCROLL helper */
.scroll-x{overflow-x:auto;scrollbar-width:none;}
.scroll-x::-webkit-scrollbar{display:none;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <h1>📚 단어 학습</h1>
    <div class="score-chip">⭐ <span id="scoreNum">0</span>점</div>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
</div>

<div class="nav">
  <button class="nav-btn on" onclick="goSec('browse')">📖 단어보기</button>
  <button class="nav-btn" onclick="goSec('matchKo')">🔗 한글뜻 매칭</button>
  <button class="nav-btn" onclick="goSec('matchDef')">🔍 영영풀이 매칭</button>
  <button class="nav-btn" onclick="goSec('quizKo')">🧩 한글뜻 퀴즈</button>
  <button class="nav-btn" onclick="goSec('quizDef')">📝 영영풀이 퀴즈</button>
</div>

<!-- ─── BROWSE ─── -->
<div class="sec on" id="sec-browse">
  <div class="sec-title">📖 단어 목록</div>
  <div style="display:flex;gap:6px;margin-bottom:12px;">
    <button class="btn btn-s" style="font-size:.78rem;padding:6px 12px;" onclick="filterLesson(0)">전체</button>
    <button class="btn btn-s" style="font-size:.78rem;padding:6px 12px;" onclick="filterLesson(1)"><span class="badge b1">L1</span></button>
    <button class="btn btn-s" style="font-size:.78rem;padding:6px 12px;" onclick="filterLesson(2)"><span class="badge b2">L2</span></button>
  </div>
  <div id="browseList"></div>
</div>

<!-- ─── MATCH KO ─── -->
<div class="sec" id="sec-matchKo">
  <div class="sec-title">🔗 한글뜻 매칭</div>
  <div class="stat-row">
    <div class="stat"><div class="n" id="mkScore">0</div><div class="l">점수</div></div>
    <div class="stat"><div class="n" id="mkRound">1</div><div class="l">라운드</div></div>
    <div class="stat"><div class="n" id="mkLeft">6</div><div class="l">남은 쌍</div></div>
  </div>
  <div class="match-info">영어 단어와 한글 뜻을 연결하세요!</div>
  <div class="match-cols">
    <div><div class="match-col-title">영어</div><div id="mkEnCol"></div></div>
    <div><div class="match-col-title">한글뜻</div><div id="mkKoCol"></div></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-p" onclick="initMatchKo()">🔄 새 라운드</button>
  </div>
</div>

<!-- ─── MATCH DEF ─── -->
<div class="sec" id="sec-matchDef">
  <div class="sec-title">🔍 영영풀이 매칭</div>
  <div class="stat-row">
    <div class="stat"><div class="n" id="mdScore">0</div><div class="l">점수</div></div>
    <div class="stat"><div class="n" id="mdRound">1</div><div class="l">라운드</div></div>
    <div class="stat"><div class="n" id="mdLeft">4</div><div class="l">남은 쌍</div></div>
  </div>
  <div class="match-info">단어와 영어 설명을 연결하세요!</div>
  <div id="mdWordCol" style="margin-bottom:8px;"></div>
  <div id="mdDefCol"></div>
  <div class="btn-row">
    <button class="btn btn-p" onclick="initMatchDef()">🔄 새 라운드</button>
  </div>
</div>

<!-- ─── QUIZ KO ─── -->
<div class="sec" id="sec-quizKo">
  <div class="sec-title">🧩 한글뜻 퀴즈</div>
  <div id="quizKoArea"></div>
</div>

<!-- ─── QUIZ DEF ─── -->
<div class="sec" id="sec-quizDef">
  <div class="sec-title">📝 영영풀이 퀴즈</div>
  <div id="quizDefArea"></div>
</div>

<script>
// ═══════════════ DATA ═══════════════
const WORDS = [
  // Lesson 1
  {l:1, w:"wave",          ko:"(손을) 흔들다",      def:"to move your hand from side to side in the air to say hello"},
  {l:1, w:"issue",         ko:"문제, 주제",          def:"an important topic that people are discussing"},
  {l:1, w:"experience",    ko:"경험",                def:"knowledge or skill that you get from doing, seeing, or feeling things"},
  {l:1, w:"survive",       ko:"살아남다",            def:"to continue to live or exist"},
  {l:1, w:"search",        ko:"찾다, 검색하다",      def:"to carefully look for someone or something"},
  {l:1, w:"aquarium",      ko:"수족관",              def:"a glass container in which fish and other water creatures can be kept"},
  {l:1, w:"at the same time", ko:"동시에",          def:"two or more things happening together"},
  {l:1, w:"blog",          ko:"블로그",              def:"a website on which one person or group puts new information regularly"},
  {l:1, w:"ceremony",      ko:"의식",                def:"an important event that includes a set of formal or traditional actions"},
  {l:1, w:"chance",        ko:"기회",                def:"a good time for you to do something"},
  {l:1, w:"cleanup",       ko:"대청소",              def:"the act of cleaning something"},
  {l:1, w:"dolphin",       ko:"돌고래",              def:"a sea animal that looks like a large fish with a pointed mouth"},
  {l:1, w:"emotional",     ko:"감정적인",            def:"showing strong feelings to other people"},
  {l:1, w:"endangered",    ko:"멸종 위기에 처한",    def:"in danger of disappearing because there are very few now alive"},
  {l:1, w:"fishing net",   ko:"고기잡이 그물",       def:"something made of strings or wires used for catching fish or animals"},
  {l:1, w:"global",        ko:"지구의",              def:"relating to the whole world"},
  {l:1, w:"run an errand", ko:"심부름을 하다",       def:"to do a small job that involves going somewhere"},
  {l:1, w:"take part in",  ko:"~에 참여하다",        def:"to join in an activity or event"},
  {l:1, w:"be in charge of",ko:"~을 담당하다",       def:"to be responsible for something or someone"},
  // Lesson 2
  {l:2, w:"airport",       ko:"공항",                def:"a place where airplanes take off and land"},
  {l:2, w:"apologize",     ko:"사과하다",            def:"to tell someone that you are sorry that you have done something wrong"},
  {l:2, w:"arrival",       ko:"도착",                def:"the act of arriving somewhere"},
  {l:2, w:"capital",       ko:"수도",                def:"an important city that is the center of government of a country"},
  {l:2, w:"casual",        ko:"평상시의",            def:"not formal or not for a formal situation"},
  {l:2, w:"communicate",   ko:"의사소통을 하다",     def:"to share information with others by speaking, writing, moving your body, etc."},
  {l:2, w:"correctly",     ko:"제대로",              def:"in a way that is right or true"},
  {l:2, w:"differently",   ko:"다르게",              def:"in a way that is not the same"},
  {l:2, w:"emoji",         ko:"이모지",              def:"a small digital image that is used to show a feeling or idea in an email or text message"},
  {l:2, w:"expression",    ko:"표현",                def:"something you say, write, or do to show your thoughts or feelings"},
  {l:2, w:"gift",          ko:"선물",                def:"something that you give to someone as a present"},
  {l:2, w:"in addition",   ko:"게다가",              def:"used for adding information to a statement"},
  {l:2, w:"loud",          ko:"(소리가) 큰",         def:"making a sound that is very strong or high"},
  {l:2, w:"meaning",       ko:"의미, 뜻",            def:"the thing or idea that a word, expression, or sign shows or tells"},
  {l:2, w:"misunderstanding",ko:"오해",              def:"a situation where someone is confused or wrong about something"},
  {l:2, w:"probably",      ko:"아마",                def:"used to say that something is likely to happen or likely to be true"},
  {l:2, w:"repeat",        ko:"반복하다",            def:"to say, tell, or do something again"},
  {l:2, w:"sensitive",     ko:"민감한, 예민한",      def:"easily changed or hurt by things around you"},
  {l:2, w:"simple",        ko:"간단한, 단순한",      def:"easy to understand or do, not difficult"},
  {l:2, w:"spell",         ko:"철자를 말하다",       def:"to say or write each letter of a word in the right order"},
  {l:2, w:"talk behind one's back",ko:"~에 대해 험담하다", def:"to say bad things about someone to other people when they are not there"},
  {l:2, w:"wonder",        ko:"궁금하다",            def:"to think about something because you are curious and want to know more"},
];

// ═══════════════ STATE ═══════════════
let totalScore = 0;
let progMax = 0; let progDone = 0;
let currentLesson = 0;
let mkSelEn=null, mkSelKo=null, mkScore=0, mkRound=1;
let mdSelW=null, mdSelD=null, mdScore=0, mdRound=1;
let quizKoIdx=0, quizKoData=[];
let quizDefIdx=0, quizDefData=[];

// ═══════════════ UTILS ═══════════════
function shuffle(arr){ return [...arr].sort(()=>Math.random()-.5); }
function pick(arr,n){ return shuffle(arr).slice(0,n); }
function addScore(n){
  totalScore+=n;
  document.getElementById('scoreNum').textContent=totalScore;
}
function setProgress(done,total){
  const p=total?Math.round(done/total*100):0;
  document.getElementById('progFill').style.width=p+'%';
}

// ═══════════════ NAV ═══════════════
function goSec(id){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('sec-'+id).classList.add('on');
  event.currentTarget.classList.add('on');
  if(id==='matchKo') initMatchKo();
  if(id==='matchDef') initMatchDef();
  if(id==='quizKo') initQuizKo();
  if(id==='quizDef') initQuizDef();
}

// ═══════════════ BROWSE ═══════════════
function filterLesson(n){
  currentLesson=n;
  renderBrowse();
}
function renderBrowse(){
  const list = currentLesson===0 ? WORDS : WORDS.filter(w=>w.l===currentLesson);
  const html = list.map((w,i)=>`
    <div class="wcard">
      <div class="wcard-top">
        <span class="badge ${w.l===1?'b1':'b2'}">L${w.l}</span>
        <span class="wcard-en">${w.w}</span>
        <span class="wcard-ko">${w.ko}</span>
      </div>
      <div class="wcard-def">📖 ${w.def}</div>
    </div>
  `).join('');
  document.getElementById('browseList').innerHTML=html;
}
renderBrowse();

// ═══════════════ MATCH KO ═══════════════
let mkPairs=[], mkDoneCount=0;
function initMatchKo(){
  mkSelEn=null; mkSelKo=null; mkDoneCount=0;
  const pool = WORDS; // all words
  mkPairs = pick(pool, 6);
  const enItems = shuffle(mkPairs);
  const koItems = shuffle(mkPairs);
  document.getElementById('mkLeft').textContent=6;
  document.getElementById('mkScore').textContent=mkScore;
  document.getElementById('mkRound').textContent=mkRound;

  const enHTML = enItems.map(w=>`
    <div class="match-item" id="mken-${w.w.replace(/ /g,'_')}" onclick="matchKoClick('en','${w.w.replace(/ /g,'_')}',this)">${w.w}</div>
  `).join('');
  const koHTML = koItems.map(w=>`
    <div class="match-item" id="mkko-${w.w.replace(/ /g,'_')}" onclick="matchKoClick('ko','${w.w.replace(/ /g,'_')}',this)">${w.ko}</div>
  `).join('');
  document.getElementById('mkEnCol').innerHTML=enHTML;
  document.getElementById('mkKoCol').innerHTML=koHTML;
}
function matchKoClick(type, key, el){
  if(el.classList.contains('ok')||el.classList.contains('ghost')) return;
  if(type==='en'){
    if(mkSelEn){ document.getElementById('mken-'+mkSelEn)?.classList.remove('sel'); }
    mkSelEn=key; el.classList.add('sel');
  } else {
    if(mkSelKo){ document.getElementById('mkko-'+mkSelKo)?.classList.remove('sel'); }
    mkSelKo=key; el.classList.add('sel');
  }
  if(mkSelEn && mkSelKo){
    if(mkSelEn===mkSelKo){
      // correct
      document.getElementById('mken-'+mkSelEn).classList.replace('sel','ok');
      document.getElementById('mkko-'+mkSelKo).classList.replace('sel','ok');
      mkScore+=10; addScore(10);
      mkDoneCount++;
      document.getElementById('mkScore').textContent=mkScore;
      document.getElementById('mkLeft').textContent=6-mkDoneCount;
      if(mkDoneCount===6){ setTimeout(()=>{ mkRound++; initMatchKo(); },600); }
    } else {
      document.getElementById('mken-'+mkSelEn).classList.add('err');
      document.getElementById('mkko-'+mkSelKo).classList.add('err');
      setTimeout(()=>{
        document.getElementById('mken-'+mkSelEn)?.classList.remove('err','sel');
        document.getElementById('mkko-'+mkSelKo)?.classList.remove('err','sel');
        mkSelEn=null; mkSelKo=null;
      },500);
      mkSelEn=null; mkSelKo=null; return;
    }
    mkSelEn=null; mkSelKo=null;
  }
}

// ═══════════════ MATCH DEF ═══════════════
let mdPairs=[], mdDoneCount=0;
function initMatchDef(){
  mdSelW=null; mdSelD=null; mdDoneCount=0;
  mdPairs = pick(WORDS, 4);
  const wItems = shuffle(mdPairs);
  const dItems = shuffle(mdPairs);
  document.getElementById('mdLeft').textContent=4;
  document.getElementById('mdScore').textContent=mdScore;
  document.getElementById('mdRound').textContent=mdRound;

  const wHTML = wItems.map(w=>`
    <div class="match-item" style="margin-bottom:6px;" id="mdw-${w.w.replace(/ /g,'_')}" onclick="matchDefClick('w','${w.w.replace(/ /g,'_')}',this)">${w.w}</div>
  `).join('');
  const dHTML = dItems.map(w=>`
    <div class="match-item" style="margin-bottom:6px;font-size:.75rem;font-weight:400;min-height:56px;" id="mdd-${w.w.replace(/ /g,'_')}" onclick="matchDefClick('d','${w.w.replace(/ /g,'_')}',this)">${w.def}</div>
  `).join('');
  document.getElementById('mdWordCol').innerHTML=wHTML;
  document.getElementById('mdDefCol').innerHTML=dHTML;
}
function matchDefClick(type, key, el){
  if(el.classList.contains('ok')) return;
  if(type==='w'){
    if(mdSelW){ document.getElementById('mdw-'+mdSelW)?.classList.remove('sel'); }
    mdSelW=key; el.classList.add('sel');
  } else {
    if(mdSelD){ document.getElementById('mdd-'+mdSelD)?.classList.remove('sel'); }
    mdSelD=key; el.classList.add('sel');
  }
  if(mdSelW && mdSelD){
    if(mdSelW===mdSelD){
      document.getElementById('mdw-'+mdSelW).classList.replace('sel','ok');
      document.getElementById('mdd-'+mdSelD).classList.replace('sel','ok');
      mdScore+=15; addScore(15);
      mdDoneCount++;
      document.getElementById('mdScore').textContent=mdScore;
      document.getElementById('mdLeft').textContent=4-mdDoneCount;
      if(mdDoneCount===4){ setTimeout(()=>{ mdRound++; initMatchDef(); },600); }
    } else {
      document.getElementById('mdw-'+mdSelW).classList.add('err');
      document.getElementById('mdd-'+mdSelD).classList.add('err');
      setTimeout(()=>{
        document.getElementById('mdw-'+mdSelW)?.classList.remove('err','sel');
        document.getElementById('mdd-'+mdSelD)?.classList.remove('err','sel');
        mdSelW=null; mdSelD=null;
      },500);
      mdSelW=null; mdSelD=null; return;
    }
    mdSelW=null; mdSelD=null;
  }
}

// ═══════════════ QUIZ KO ═══════════════
function initQuizKo(){
  quizKoData = shuffle(WORDS);
  quizKoIdx=0;
  renderQuizKo();
}
function renderQuizKo(){
  if(quizKoIdx>=quizKoData.length){
    document.getElementById('quizKoArea').innerHTML=`
      <div class="result-banner"><h2>🎉 완료!</h2><p>모든 단어를 다 풀었어요!</p></div>
      <div class="btn-row"><button class="btn btn-p" onclick="initQuizKo()">🔄 다시 풀기</button></div>`;
    return;
  }
  const cur = quizKoData[quizKoIdx];
  const wrong = shuffle(WORDS.filter(w=>w.w!==cur.w)).slice(0,3);
  const opts = shuffle([cur, ...wrong]);
  const pct = Math.round(quizKoIdx/quizKoData.length*100);
  setProgress(quizKoIdx, quizKoData.length);

  document.getElementById('quizKoArea').innerHTML=`
    <div class="q-card">
      <div class="q-num">${quizKoIdx+1} / ${quizKoData.length}</div>
      <div class="q-word">${cur.w}</div>
      <div class="q-hint">📖 ${cur.def}</div>
      <div class="opts">
        ${opts.map(o=>`<button class="opt" onclick="checkQuizKo('${o.w.replace(/'/g,"\\'")}','${cur.w.replace(/'/g,"\\'")}',this)">${o.ko}</button>`).join('')}
      </div>
      <div class="q-feedback" id="qkFb"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-s" onclick="quizKoIdx++;renderQuizKo()">건너뛰기 ➡️</button>
    </div>`;
}
function checkQuizKo(selected, correct, el){
  document.querySelectorAll('#quizKoArea .opt').forEach(b=>b.disabled=true);
  const fb = document.getElementById('qkFb');
  if(selected===correct){
    el.classList.add('ok');
    fb.textContent='✅ 정답!'; fb.className='q-feedback show ok';
    addScore(5);
    setTimeout(()=>{ quizKoIdx++; renderQuizKo(); },800);
  } else {
    el.classList.add('err');
    document.querySelectorAll('#quizKoArea .opt').forEach(b=>{ if(b.textContent===WORDS.find(w=>w.w===correct)?.ko) b.classList.add('reveal'); });
    fb.textContent='❌ 틀렸어요! 정답: '+WORDS.find(w=>w.w===correct)?.ko;
    fb.className='q-feedback show err';
    setTimeout(()=>{ quizKoIdx++; renderQuizKo(); },1400);
  }
}

    document.querySelectorAll('#quizDefArea .opt').forEach(b=>{ if(b.textContent===correct) b.classList.add('reveal'); });
    fb.textContent='❌ 틀렸어요! 정답: '+correct;
    fb.className='q-feedback show err';
    setTimeout(()=>{ quizDefIdx++; renderQuizDef(); },1400);
  }
}
